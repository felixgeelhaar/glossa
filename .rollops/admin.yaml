apiVersion: rollops.klarlabs.de/v1
kind: RolloutConfig
metadata:
  name: glossa-admin
spec:
  target:
    kind: kubernetes
    ref: glossa/prod/admin
    criticality: high
    spec:
      namespace: glossa
      resource: deployment/admin
      image: ghcr.io/felixgeelhaar/glossa-admin:v0.2.0
      manifest: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          annotations:
            meta.helm.sh/release-name: glossa
            meta.helm.sh/release-namespace: glossa
          labels:
            app.kubernetes.io/instance: glossa
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: glossa
            app.kubernetes.io/version: 0.1.0
            helm.sh/chart: glossa-0.1.1
          name: admin
          namespace: glossa
        spec:
          progressDeadlineSeconds: 600
          replicas: 1
          revisionHistoryLimit: 10
          selector:
            matchLabels:
              app: admin
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
            type: RollingUpdate
          template:
            metadata:
              labels:
                app: admin
                app.kubernetes.io/instance: glossa
                app.kubernetes.io/name: glossa
            spec:
              containers:
              - image: ghcr.io/felixgeelhaar/glossa-admin:v0.2.0
                imagePullPolicy: IfNotPresent
                name: admin
                ports:
                - containerPort: 80
                  protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /
                    port: 80
                    scheme: HTTP
                  initialDelaySeconds: 3
                  periodSeconds: 5
                  successThreshold: 1
                  timeoutSeconds: 1
                resources:
                  limits:
                    memory: 96Mi
                  requests:
                    cpu: 25m
                    memory: 32Mi
                terminationMessagePath: /dev/termination-log
                terminationMessagePolicy: File
              dnsPolicy: ClusterFirst
              restartPolicy: Always
              schedulerName: default-scheduler
              securityContext: {}
              terminationGracePeriodSeconds: 30
  strategy:
    type: rolling
  verification: shallow
  imagePolicy:
    mode: minor
