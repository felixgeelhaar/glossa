apiVersion: rollops.klarlabs.de/v1
kind: RolloutConfig
metadata:
  name: glossa-api
spec:
  target:
    kind: kubernetes
    ref: glossa/prod/api
    criticality: high
    spec:
      namespace: glossa
      resource: deployment/api
      image: ghcr.io/felixgeelhaar/glossa-api:v0.2.0
      manifest: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          annotations:
            meta.helm.sh/release-name: glossa
            meta.helm.sh/release-namespace: glossa
          labels:
            app.kubernetes.io/instance: glossa
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: glossa
            app.kubernetes.io/version: 0.1.0
            helm.sh/chart: glossa-0.1.1
          name: api
          namespace: glossa
        spec:
          progressDeadlineSeconds: 600
          replicas: 1
          revisionHistoryLimit: 10
          selector:
            matchLabels:
              app: api
          strategy:
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
            type: RollingUpdate
          template:
            metadata:
              labels:
                app: api
                app.kubernetes.io/instance: glossa
                app.kubernetes.io/name: glossa
            spec:
              containers:
              - envFrom:
                - configMapRef:
                    name: glossa-app-config
                - secretRef:
                    name: glossa-app
                image: ghcr.io/felixgeelhaar/glossa-api:v0.2.0
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /healthz
                    port: 8080
                    scheme: HTTP
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  successThreshold: 1
                  timeoutSeconds: 1
                name: api
                ports:
                - containerPort: 8080
                  protocol: TCP
                readinessProbe:
                  failureThreshold: 3
                  httpGet:
                    path: /healthz
                    port: 8080
                    scheme: HTTP
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  successThreshold: 1
                  timeoutSeconds: 1
                resources:
                  limits:
                    memory: 256Mi
                  requests:
                    cpu: 50m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  runAsNonRoot: true
                  runAsUser: 65532
                  seccompProfile:
                    type: RuntimeDefault
                terminationMessagePath: /dev/termination-log
                terminationMessagePolicy: File
              dnsPolicy: ClusterFirst
              initContainers:
              - command:
                - sh
                - -c
                - 'until nc -z -w3 postgres 5432; do echo "waiting for postgres"; sleep 2;
                  done
        
                  echo "postgres reachable"
        
                  '
                image: busybox:1.36
                imagePullPolicy: IfNotPresent
                name: wait-for-db
                resources:
                  limits:
                    cpu: 100m
                    memory: 32Mi
                  requests:
                    cpu: 10m
                    memory: 16Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  runAsNonRoot: true
                  runAsUser: 65532
                  seccompProfile:
                    type: RuntimeDefault
                terminationMessagePath: /dev/termination-log
                terminationMessagePolicy: File
              - args:
                - -path
                - /migrations
                - -database
                - $(DATABASE_URL)
                - up
                command:
                - /migrate
                env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      key: DATABASE_URL
                      name: glossa-app
                image: ghcr.io/felixgeelhaar/glossa-api:v0.2.0
                imagePullPolicy: IfNotPresent
                name: migrate
                resources:
                  limits:
                    memory: 128Mi
                  requests:
                    cpu: 25m
                    memory: 32Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  runAsNonRoot: true
                  runAsUser: 65532
                  seccompProfile:
                    type: RuntimeDefault
                terminationMessagePath: /dev/termination-log
                terminationMessagePolicy: File
              restartPolicy: Always
              schedulerName: default-scheduler
              securityContext: {}
              terminationGracePeriodSeconds: 30
  strategy:
    type: rolling
  verification: shallow
  imagePolicy:
    mode: minor
