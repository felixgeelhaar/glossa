openapi: 3.1.0
info:
  title: Glossa API
  version: 0.1.0
  description: |
    REST API for Glossa — self-hosted multi-tenant translation management.

    Authentication: project-scoped Bearer API keys (prefix `glossa_`)
    on all routes under `/api/v1/projects/{slug}`. Project creation
    is currently unauthenticated; an admin JWT flow lands in a later
    slice. The API key is shown exactly once on project create or
    rotate — the server stores only the SHA-256 hash.

    Multi-tenancy: every authed request wraps its handlers in a tx
    plus `SET LOCAL app.current_tenant = '<uuid>'` so Postgres
    Row-Level Security enforces tenant isolation at the DB layer.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
  - name: projects
  - name: locales
  - name: keys
  - name: translations

security:
  - apiKey: []

paths:
  /healthz:
    get:
      operationId: healthz
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /readyz:
    get:
      operationId: readyz
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: Service is ready to serve traffic
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }

  /api/v1/projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      description: |
        Bootstraps a new project under an existing tenant. Returns
        the newly minted API key in cleartext exactly once — store
        it immediately, the server keeps only the SHA-256 hash.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateProjectResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /api/v1/projects/{slug}/api-keys:
    post:
      operationId: rotateProjectAPIKey
      tags: [projects]
      summary: Rotate the project API key
      description: |
        Revokes the current key by replacing its stored hash and
        returns a fresh raw key. The previous key stops working
        immediately. Like project create, the new key is surfaced
        exactly once.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: Rotated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RotateAPIKeyResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/projects/{slug}/locales:
    get:
      operationId: listLocales
      tags: [locales]
      summary: List locales for a project
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      responses:
        "200":
          description: Locales
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Locale" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createLocale
      tags: [locales]
      summary: Create a locale
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLocaleRequest" }
      responses:
        "201":
          description: Locale created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Locale" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /api/v1/projects/{slug}/keys:scan:
    post:
      operationId: scanKeys
      tags: [keys]
      summary: Batch UPSERT translation keys
      description: |
        The endpoint the CLI `glossa scan` command targets. Returns
        per-row results so the CLI can map per-key errors back to
        source locations.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScanKeysRequest" }
      responses:
        "200":
          description: Per-row results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScanKeysResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /api/v1/projects/{slug}/locales/{locale}/messages:
    get:
      operationId: listBundle
      tags: [translations]
      summary: Fetch the full message bundle for a locale
      description: |
        Returns every key for the project paired with its value in
        the requested locale, plus a parallel statuses map so the
        SDK can distinguish approved from pending entries.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
        - $ref: "#/components/parameters/LocaleCode"
      responses:
        "200":
          description: Bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Bundle" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/projects/{slug}/locales/{locale}/keys/{key}:
    patch:
      operationId: patchTranslation
      tags: [translations]
      summary: Update a single translation
      description: |
        Translator-facing endpoint. Defaults to status `needs_review`
        unless an explicit `status` is supplied.
      parameters:
        - $ref: "#/components/parameters/ProjectSlug"
        - $ref: "#/components/parameters/LocaleCode"
        - $ref: "#/components/parameters/KeyName"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchTranslationRequest" }
      responses:
        "200":
          description: Translation updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Translation" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      bearerFormat: glossa_<hex>
      description: |
        Project-scoped API key. Header form: `Authorization: Bearer
        glossa_<32-byte-hex>`. The server compares its SHA-256 hash
        against the stored project hash; lookup failures all return
        401 (no distinction between "no such key" and "key valid
        but project deleted") to deny status-code probing.

  parameters:
    ProjectSlug:
      name: slug
      in: path
      required: true
      schema: { type: string, pattern: "^[a-z0-9][a-z0-9-]*$", maxLength: 50 }
      description: URL-friendly project identifier
    LocaleCode:
      name: locale
      in: path
      required: true
      schema: { type: string, pattern: "^[a-z]{2,3}(?:-[A-Z]{2})?$" }
      description: BCP-47 locale code (e.g. `en`, `de`, `pt-BR`)
    KeyName:
      name: key
      in: path
      required: true
      schema: { type: string }
      description: Dotted lowercase key name (e.g. `cart.checkout.button`)

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }

    CreateProjectRequest:
      type: object
      required: [tenantId, slug, name]
      properties:
        tenantId: { type: string, format: uuid }
        slug: { type: string, pattern: "^[a-z0-9][a-z0-9-]*$", maxLength: 50 }
        name: { type: string, maxLength: 200 }
        defaultLocale: { type: string, default: de }

    CreateProjectResponse:
      type: object
      required: [id, tenantId, slug, name, defaultLocale, apiKey]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        defaultLocale: { type: string }
        apiKey:
          type: string
          description: |
            Raw API key, shown exactly once. Format: `glossa_<hex>`.
            Store immediately — the server keeps only the SHA-256
            hash.

    RotateAPIKeyResponse:
      type: object
      required: [apiKey]
      properties:
        apiKey: { type: string, description: New raw API key (shown once) }

    CreateLocaleRequest:
      type: object
      required: [code, label]
      properties:
        code: { type: string, pattern: "^[a-z]{2,3}(?:-[A-Z]{2})?$" }
        label: { type: string, maxLength: 50 }

    Locale:
      type: object
      required: [id, code, label, enabled]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        label: { type: string }
        enabled: { type: boolean }

    ScanKeysRequest:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              description: { type: string }

    ScanKeysResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              id: { type: string, format: uuid, description: Present only on success }
              description: { type: string }
              error: { type: string, description: Present only on per-row failure }

    Bundle:
      type: object
      required: [project, locale, messages, statuses]
      properties:
        project: { type: string }
        locale: { type: string }
        messages:
          type: object
          additionalProperties: { type: string }
          description: Flat key → translated message map
        statuses:
          type: object
          additionalProperties:
            type: string
            enum: [pending, needs_review, approved]
          description: Parallel key → status map for entries that have one

    PatchTranslationRequest:
      type: object
      required: [value]
      properties:
        value: { type: string }
        status:
          type: string
          enum: [pending, needs_review, approved]
          description: Defaults to `needs_review` if omitted
        updatedBy: { type: string, format: uuid }

    Translation:
      type: object
      required: [id, value, status]
      properties:
        id: { type: string, format: uuid }
        value: { type: string }
        status: { type: string, enum: [pending, needs_review, approved] }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

  responses:
    BadRequest:
      description: Malformed request body or parameters
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found for this project (may also indicate RLS isolation)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UnprocessableEntity:
      description: Validation error (domain rules rejected the payload)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
