# Local stack for development + demo.
#
#   docker compose up --build
#
# Brings up:
#   - postgres:16-alpine on :5432
#   - glossa-api on :8080 (Go binary, migrations applied via the
#     initContainer-equivalent `migrate` service that runs to
#     completion before the api service starts)
#   - glossa-admin on :5173 (nginx serving the static vite bundle)
#
# Bootstrap creates a `demo` tenant with admin `felix@example.com`
# / `hunter2hunter2` on first start. Idempotent — re-runs are no-ops.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glossa
      POSTGRES_PASSWORD: glossa
      POSTGRES_DB: glossa
    # No host port mapping — postgres reached over the compose
    # network from api / migrate only. Avoids clashing with a
    # local Brotwerk/Glossa-dev postgres already on 5432.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glossa", "-d", "glossa"]
      interval: 2s
      timeout: 5s
      retries: 30

  # Schema migrate runs to completion, then exits. The api service
  # depends_on this with condition: service_completed_successfully
  # so it can't start against an out-of-date schema.
  migrate:
    build:
      context: apps/api
    entrypoint: ["/migrate"]
    command:
      - -path
      - /migrations
      - -database
      - postgres://glossa:glossa@postgres:5432/glossa?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: apps/api
    environment:
      DATABASE_URL: postgres://glossa:glossa@postgres:5432/glossa?sslmode=disable
      JWT_SIGNING_KEY: "dev-jwt-key-not-for-prod-32chars+"
      PORT: "8080"
      LOG_LEVEL: debug
      BOOTSTRAP_TENANT_SLUG: demo
      BOOTSTRAP_TENANT_NAME: Demo Tenant
      BOOTSTRAP_ADMIN_EMAIL: felix@example.com
      BOOTSTRAP_ADMIN_PASSWORD: hunter2hunter2
    # No host port mapping — admin nginx proxies /api/* to here
    # over the compose network. Avoids clashing with a brotwerk
    # api on host :8080.
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
