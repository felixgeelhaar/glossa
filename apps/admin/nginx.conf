# nginx config for the admin SPA. Static asset server + SPA
# fallback. The admin has no server-side routing; any path that
# isn't a real file should serve index.html so client-side state
# (which-locale, which-key-selected) survives a refresh.
#
# Compression is on for everything text-shaped — keeps the
# already-small bundle small over the wire.

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # /api/* → glossa-api on the compose network. Lets the admin SPA
  # talk to the API as same-origin so no CORS plumbing is needed,
  # both in this local stack and behind the Traefik IngressRoute in
  # prod (same shape, different upstream).
  #
  # SSE endpoints: disable buffering, long timeout. nginx defaults
  # buffer 8KB which kills the event-by-event stream and times out
  # idle connections at 60s — we send heartbeats every 30s but the
  # connection itself must live longer.
  location /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    chunked_transfer_encoding off;
  }

  # Long-cache fingerprinted assets. Vite emits filenames with a
  # content hash so a stale browser cache cannot serve broken JS
  # against a new index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html — never cache. Each deploy needs the latest entry
  # point so the new asset bundle is referenced.
  location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /index.html =404;
  }

  # SPA fallback for any unknown path.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types
    application/javascript
    application/json
    text/css
    text/plain
    text/html
    image/svg+xml;
  gzip_min_length 256;
}
