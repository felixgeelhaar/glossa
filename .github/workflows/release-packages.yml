name: Release packages

# Publishes the `@felixgeelhaar/glossa-*` npm packages.
#
# Flow:
#   1. PR lands on `main` with a `.changeset/*.md` file describing
#      its impact + bump level.
#   2. This workflow's `release` job opens (or updates) a "Version
#      Packages" PR that consumes every pending changeset, bumps
#      each affected package's version, and rewrites its CHANGELOG.
#   3. Merging that PR re-fires this workflow; the `publish` step
#      runs `changeset publish` which uploads every package whose
#      version no longer matches what's on npm.
#
# Auth: npm trusted publishing (OIDC). No long-lived token.
#   On npmjs.com, configure each package as a trusted publisher:
#     Owner:        felixgeelhaar
#     Repository:   glossa
#     Workflow:     .github/workflows/release-packages.yml
#     Environment:  (empty)
#   Setup-node + pnpm exchange the workflow's OIDC token for a
#   short-lived publish token at runtime. Provenance + signature
#   are attached automatically.
#
# Requires:
#   - `id-token: write` permission on this workflow (declared below).
#   - pnpm >= 10.6 (action-setup@v4 already pulls a recent enough
#     version; pinning explicit version below to keep behaviour
#     reproducible).
#   - npm >= 11.5.1 inside the runner — Node 24 ships an npm new
#     enough; for Node 22 we install the latest npm explicitly.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # let the action open the version PR
  pull-requests: write
  id-token: write   # required for npm publish --provenance

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Pin npm to a trusted-publishing-capable version
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @felixgeelhaar/glossa-format build
          pnpm --filter @felixgeelhaar/glossa-sdk build
          pnpm --filter @felixgeelhaar/glossa-ui build
          pnpm --filter @felixgeelhaar/glossa-elements build
          pnpm --filter @felixgeelhaar/glossa-cli build

      - uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: auth happens via npm trusted publishing.
          # The runner exchanges its OIDC token for a short-lived
          # publish credential automatically when no token is set.
