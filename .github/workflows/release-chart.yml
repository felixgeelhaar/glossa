name: Release Helm chart

# Packages + pushes the Glossa Helm chart to GHCR as an OCI artifact.
#
# Trigger options:
#   - Tag push v*.*.*       → packages chart with Chart.yaml's `version`
#   - workflow_dispatch     → manual publish for off-cycle pre-releases
#
# Consumers install with:
#   helm install glossa oci://ghcr.io/felixgeelhaar/charts/glossa \
#     --version <chart-version>

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Package + push chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint
        run: helm lint deploy/charts/glossa/

      - name: Render smoke test
        run: |
          # Render with a representative two-host config so a
          # template error blocks the publish instead of shipping
          # a broken chart.
          cat > /tmp/smoke-values.yaml <<'EOF'
          ingress:
            hosts:
              - host: glossa.example.com
                tls: { secretName: glossa-example-com-tls }
              - host: glossa.other-tenant.com
                tls: { secretName: glossa-other-tenant-com-tls }
          api:
            corsOrigins:
              - https://app.example.com
              - https://other.example.com
          EOF
          helm template glossa deploy/charts/glossa/ -f /tmp/smoke-values.yaml \
            --namespace glossa > /dev/null

      - name: Package
        id: package
        run: |
          helm package deploy/charts/glossa/ --destination /tmp/chart
          PACKAGE=$(ls /tmp/chart/glossa-*.tgz | head -1)
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to OCI registry
        run: |
          helm push "${{ steps.package.outputs.package }}" oci://ghcr.io/${{ github.repository_owner }}/charts
