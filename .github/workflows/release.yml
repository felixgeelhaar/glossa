name: Release

# Pipeline shape:
#
#   publish-api / publish-admin — build + push container images to
#   ghcr.io on push to main, on v*.*.* tag pushes, and on
#   workflow_dispatch. Tag pushes also produce :latest + :<semver>
#   tags so downstream operators can pin.
#
# Glossa is self-hosted — deployment is the operator's
# responsibility. See deploy/k3s/ for reference manifests.
#
# Cut a release:
#   git tag v1.2.3 && git push --tags

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/glossa-api
  IMAGE_ADMIN: ghcr.io/${{ github.repository_owner }}/glossa-admin

jobs:
  publish-api:
    name: Build + push API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=manual-,enable=${{ github.event_name == 'workflow_dispatch' }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # CX33 is amd64. Add linux/arm64 if the host changes.
          platforms: linux/amd64

      # Image scan via nox. Failing thresholds gate the rollout —
      # `continue-on-error: true` while the scanner is still being
      # tuned to project-specific allowlists; flip off once the
      # baseline is clean and we're confident the gate has no false
      # positives that would block a real fix.
      # Image scan via `felixgeelhaar/nox-action@v1` re-enables here
      # once the action repo is published. Left as a no-op for now so
      # the workflow setup phase doesn't fail trying to resolve it.
      - name: nox scan (api image — placeholder)
        run: echo "nox scan disabled until felixgeelhaar/nox-action is published"

  publish-admin:
    name: Build + push admin image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_ADMIN }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=manual-,enable=${{ github.event_name == 'workflow_dispatch' }}
      - uses: docker/build-push-action@v6
        with:
          # Monorepo root build context — apps/admin/Dockerfile
          # needs the workspace tree to resolve @glossa/* deps.
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: nox scan (admin image — placeholder)
        run: echo "nox scan disabled until felixgeelhaar/nox-action is published"
