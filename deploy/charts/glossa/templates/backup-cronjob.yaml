{{- if .Values.backup.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: glossa-backup
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: {{ .Values.backup.image }}
              command:
                - sh
                - -c
                - |
                  set -eu
                  apk add --no-cache postgresql-client rclone openssh-client > /dev/null
                  STAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  FILE="/tmp/glossa-$STAMP.sql.gz"
                  pg_dump "$DATABASE_URL" --no-owner --no-privileges --clean --if-exists | gzip > "$FILE"
                  rclone --config /rclone/rclone.conf copy "$FILE" "${REMOTE_DESTINATION}/"
                  # Retention: trim anything older than RETAIN_DAYS at the remote.
                  rclone --config /rclone/rclone.conf delete --min-age "${RETAIN_DAYS}d" "${REMOTE_DESTINATION}/"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "glossa.secretName" . }}
                      key: DATABASE_URL
                - name: REMOTE_DESTINATION
                  value: {{ .Values.backup.remoteDestination | quote }}
                - name: RETAIN_DAYS
                  value: {{ .Values.backup.retainDays | quote }}
              volumeMounts:
                - name: rclone
                  mountPath: /rclone
                  readOnly: true
          volumes:
            - name: rclone
              secret:
                secretName: {{ .Values.backup.rcloneSecret }}
                defaultMode: 0400
{{- end }}
