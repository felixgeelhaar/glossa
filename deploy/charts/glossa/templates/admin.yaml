apiVersion: v1
kind: Service
metadata:
  name: admin
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  selector:
    app: admin
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.admin.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        {{- include "glossa.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: admin
          image: {{ include "glossa.admin.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Hardening — nginx-unprivileged image runs as uid 101 on :8080.
          # Satisfies PodSecurity "restricted".
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources: {{- toYaml .Values.admin.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
