{{- if eq .Values.postgres.mode "bundled" -}}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # postgres:16-alpine runs as uid/gid 70; fsGroup makes the data PVC
      # group-writable. PGDATA is a subdir so the fsGroup'd mount-point
      # perms don't trip postgres's 0700 check. PodSecurity "restricted".
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ include "glossa.postgres.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 5432
          env:
            # ⚠️ existing data is at the mount root → fresh DB on this
            # subdir switch. Pre-launch (no users) so acceptable.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            # Reuses POSTGRES_USER / PASSWORD / DB from the same
            # Secret the api reads its DATABASE_URL from. Keep both
            # in sync.
            - secretRef:
                name: {{ include "glossa.secretName" . }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgres.storage.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
