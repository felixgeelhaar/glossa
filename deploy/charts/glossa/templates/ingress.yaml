{{- if .Values.ingress.enabled -}}
{{- if .Values.ingress.certManager.enabled }}
{{- range .Values.ingress.hosts }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "tls-%s" (.host | replace "." "-") }}
  labels: {{- include "glossa.labels" $ | nindent 4 }}
spec:
  secretName: {{ .tls.secretName }}
  issuerRef:
    name: {{ $.Values.ingress.certManager.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .host }}
    {{- if $.Values.ingress.wwwRedirect }}
    - {{ printf "www.%s" .host }}
    {{- end }}
{{- end }}
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: glossa-compress
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  compress: {}
{{- if .Values.ingress.httpsRedirect }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: glossa-https-redirect
  labels: {{- include "glossa.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}
{{- if .Values.ingress.wwwRedirect }}
{{- range .Values.ingress.hosts }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ printf "glossa-www-redirect-%s" (.host | replace "." "-") }}
  labels: {{- include "glossa.labels" $ | nindent 4 }}
spec:
  redirectRegex:
    regex: {{ printf "^https://www\\.%s/(.*)" (.host | replace "." "\\.") | quote }}
    replacement: {{ printf "https://%s/$${1}" .host | quote }}
    permanent: true
{{- end }}
{{- end }}
{{- range .Values.ingress.hosts }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ printf "glossa-%s" (.host | replace "." "-") }}
  labels: {{- include "glossa.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    {{- if $.Values.ingress.wwwRedirect }}
    - match: Host(`{{ printf "www.%s" .host }}`)
      kind: Rule
      priority: 100
      middlewares:
        - name: {{ printf "glossa-www-redirect-%s" (.host | replace "." "-") }}
      services:
        - name: admin
          port: 80
    {{- end }}
    - match: Host(`{{ .host }}`) && PathPrefix(`/api`)
      kind: Rule
      priority: 50
      middlewares:
        - name: glossa-compress
      services:
        - name: api
          port: 8080
    - match: Host(`{{ .host }}`)
      kind: Rule
      priority: 10
      middlewares:
        - name: glossa-compress
      services:
        - name: admin
          port: 80
  tls:
    secretName: {{ .tls.secretName }}
{{- if $.Values.ingress.httpsRedirect }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ printf "glossa-http-redirect-%s" (.host | replace "." "-") }}
  labels: {{- include "glossa.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: (Host(`{{ .host }}`) {{- if $.Values.ingress.wwwRedirect }} || Host(`{{ printf "www.%s" .host }}`){{- end }}) && !PathPrefix(`/.well-known/acme-challenge/`)
      kind: Rule
      middlewares:
        - name: glossa-https-redirect
      services:
        - name: admin
          port: 80
{{- end }}
{{- end }}
{{- end }}
