{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "glossa.secretName" . }}
  labels: {{- include "glossa.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required when secrets.create is true" .Values.secrets.databaseUrl | quote }}
  JWT_SIGNING_KEY: {{ required "secrets.jwtSigningKey is required when secrets.create is true" .Values.secrets.jwtSigningKey | quote }}
  {{- if .Values.secrets.glossaSecretsKey }}
  GLOSSA_SECRETS_KEY: {{ .Values.secrets.glossaSecretsKey | quote }}
  {{- end }}
  {{- with .Values.secrets.bootstrap }}
  {{- if .tenantSlug }}
  BOOTSTRAP_TENANT_SLUG: {{ .tenantSlug | quote }}
  {{- end }}
  {{- if .tenantName }}
  BOOTSTRAP_TENANT_NAME: {{ .tenantName | quote }}
  {{- end }}
  {{- if .adminEmail }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .adminEmail | quote }}
  {{- end }}
  {{- if .adminPassword }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .adminPassword | quote }}
  {{- end }}
  {{- end }}
{{- end }}
