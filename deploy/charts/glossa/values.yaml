# Default values for the Glossa chart.

## ── Images ────────────────────────────────────────────────────────
image:
  registry: ghcr.io
  pullPolicy: IfNotPresent

api:
  image:
    repository: felixgeelhaar/glossa-api
    # tag defaults to .Chart.AppVersion when unset
    tag: ""
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  # Extra env vars layered on top of the chart-managed defaults +
  # the glossa-app Secret. Useful for GLOSSA_CORS_ORIGINS, LOG_LEVEL,
  # etc., without rebuilding the chart.
  extraEnv: {}
  # GLOSSA_CORS_ORIGINS as a YAML list. Rendered into the api
  # container env as a comma-joined string. Empty = allow any origin
  # (safe for the API-key surface; pin once you know your consumers).
  corsOrigins: []

admin:
  image:
    repository: felixgeelhaar/glossa-admin
    tag: ""
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 96Mi

## ── Postgres ──────────────────────────────────────────────────────
## Two modes:
##
##   mode: bundled — chart installs Postgres 16 as a StatefulSet +
##     PVC. Sized for a single-node home-lab. Good enough until
##     you outgrow it.
##
##   mode: external — chart skips the Postgres install and reads
##     DATABASE_URL from the existing Secret you point it at
##     (`existingSecret`). Use this for a managed Postgres (RDS,
##     Cloud SQL, …) or an in-cluster Postgres operator.
postgres:
  mode: bundled
  image:
    # postgres lives on docker.io, not the global image.registry
    # ghcr.io used for the glossa apps.
    registry: docker.io
    repository: postgres
    tag: "16-alpine"
  storage:
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

## ── Secrets ───────────────────────────────────────────────────────
## By default the chart expects you to pre-create a Secret named
## `glossa-app` carrying:
##   DATABASE_URL          – postgres connection string
##   JWT_SIGNING_KEY       – min 32 bytes
##   GLOSSA_SECRETS_KEY    – 64 hex chars (AES-GCM, AI translator)
##   BOOTSTRAP_*           – optional first-run admin user
##
## Set `secrets.create: true` to let the chart create it from the
## values below (NOT recommended for prod — values committed to
## values.yaml end up in `helm get values`).
secrets:
  existingSecret: glossa-app
  create: false
  databaseUrl: ""
  jwtSigningKey: ""
  glossaSecretsKey: ""
  bootstrap:
    tenantSlug: ""
    tenantName: ""
    adminEmail: ""
    adminPassword: ""

## ── Ingress ───────────────────────────────────────────────────────
## Traefik-flavoured by default (k3s ships Traefik). Each host below
## gets a dedicated Certificate (cert-manager) + IngressRoute pair.
## Routes:
##   /api/*           → api Service :8080
##   everything else  → admin Service :80
##
## Mount the same Glossa instance under multiple domains by listing
## each here. Tenants are inferred per-request from the API key /
## JWT, so the host is purely a routing + branding concern.
ingress:
  enabled: true
  className: traefik
  certManager:
    enabled: true
    clusterIssuer: letsencrypt-prod
  hosts:
    - host: glossa.example.com
      tls:
        secretName: glossa-example-com-tls
  # Optional 308 redirect from www.<host> → apex.
  wwwRedirect: true
  # Optional 308 HTTP → HTTPS redirect.
  httpsRedirect: true

## ── Backup CronJob ────────────────────────────────────────────────
## Daily pg_dump → rclone-synced to an offsite target. Requires a
## pre-created `rclone-config` Secret holding rclone.conf + the SSH
## key the target uses.
backup:
  enabled: false
  schedule: "0 3 * * *"
  retainDays: 14
  image: alpine:3
  rcloneSecret: rclone-config
  remoteDestination: ""  # e.g. b2:my-bucket/glossa-backups

## ── Pod-level knobs ───────────────────────────────────────────────
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
