# Template only — DO NOT commit real values. Apply via
# `kubectl apply -f` after editing, or pipe through `kubectl create
# secret generic --from-literal ...` for the same effect.
#
# Required secrets:
#   glossa-app        — DATABASE_URL, JWT_SIGNING_KEY
#   glossa-postgres   — POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   rclone-config     — rclone.conf + SSH key for backup target
#                       (created out-of-band, see backup-cronjob.yaml)
---
apiVersion: v1
kind: Namespace
metadata:
  name: glossa
---
apiVersion: v1
kind: Secret
metadata:
  name: glossa-app
  namespace: glossa
type: Opaque
stringData:
  # Postgres uses the in-cluster headless Service name `postgres`.
  DATABASE_URL: "postgres://glossa:REPLACE_ME@postgres:5432/glossa?sslmode=disable"
  # 32+ random bytes, base64. `openssl rand -base64 48` works.
  JWT_SIGNING_KEY: "REPLACE_ME_WITH_OPENSSL_RAND"
---
apiVersion: v1
kind: Secret
metadata:
  name: glossa-postgres
  namespace: glossa
type: Opaque
stringData:
  POSTGRES_USER: "glossa"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "glossa"
