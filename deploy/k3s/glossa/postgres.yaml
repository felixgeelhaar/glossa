# Postgres StatefulSet — single replica, PVC-backed.
#
# Single replica is fine on single-node k3s; HA Postgres is a
# separate concern (CloudNativePG operator or a managed DB). The
# PVC binds to local-path on the node so data persists across pod
# restarts — that's the third acceptance bullet for task-deploy.
#
# Service is headless (clusterIP: None) so the StatefulSet pod can
# be reached as `postgres-0.postgres.glossa.svc.cluster.local` and
# DATABASE_URL can use the short `postgres` name from app config.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: glossa
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: glossa
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: glossa-postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "glossa", "-d", "glossa"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "glossa", "-d", "glossa"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        # Spec called for 20Gi; we honour it. Glossa data is small
        # (TEXT translations + audit log) so this lasts years.
        resources:
          requests:
            storage: 20Gi
