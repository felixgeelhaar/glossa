# Admin SPA — nginx serving the prebuilt vite bundle.
#
# Stateless: no DB connection, no env-var rewriting (the SPA reads
# its config from the translator's localStorage prompt). One
# replica is enough for the admin surface; a maintenance translator
# can absorb a single-pod restart.
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: glossa
spec:
  selector:
    app: admin
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: glossa
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: ghcr.io/felixgeelhaar/glossa-admin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
