# Go API — Deployment + Service + ConfigMap.
#
# Sensitive config (DATABASE_URL, JWT_SIGNING_KEY) comes from the
# `glossa-app` Secret. Non-secret knobs live in the
# `glossa-app-config` ConfigMap.
#
# The migration initContainer blocks the api container from
# starting until the schema is at the version baked into the
# image. A bad migration leaves the pod NotReady → rollout fails
# → workflow auto-rollback restores the previous image.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: glossa
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glossa-app-config
  namespace: glossa
data:
  PORT: "8080"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: glossa
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/felixgeelhaar/glossa-api:latest
          imagePullPolicy: Always
          command:
            - /migrate
          args:
            - -path
            - /migrations
            - -database
            - $(DATABASE_URL)
            - up
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: glossa-app
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
      containers:
        - name: api
          image: ghcr.io/felixgeelhaar/glossa-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: glossa-app-config
            - secretRef:
                name: glossa-app
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
