# Daily Postgres backup → Hetzner Storage Box via rclone (SFTP).
#
# Provision the Storage Box once in the Hetzner console
# (Robot → Storage Box). Add the `deploy` user's public key, build
# the rclone.conf locally, then push it into the cluster:
#
#   kubectl -n glossa create secret generic rclone-config \
#     --from-file=rclone.conf=/home/deploy/.config/rclone/rclone.conf \
#     --from-file=id_storagebox=/home/deploy/.ssh/id_storagebox
#
# Verify a manual run:
#
#   kubectl -n glossa create job --from=cronjob/postgres-backup \
#     manual-pg-$(date +%s)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: glossa
spec:
  schedule: "0 3 * * *"   # 03:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: glossa-postgres
                      key: POSTGRES_PASSWORD
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  ts=$(date -u +%Y%m%dT%H%M%SZ)
                  apk add --no-cache rclone >/dev/null
                  install -m 0600 /etc/rclone/id_storagebox /tmp/id_storagebox
                  pg_dump -h postgres -U glossa glossa \
                    | gzip > /tmp/glossa-$ts.sql.gz
                  rclone --config /etc/rclone/rclone.conf \
                    copy /tmp/glossa-$ts.sql.gz storagebox:db/
                  # Retain 30 days on the remote.
                  rclone --config /etc/rclone/rclone.conf \
                    delete --min-age 30d storagebox:db/
              volumeMounts:
                - name: rclone-config
                  mountPath: /etc/rclone
                  readOnly: true
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-config
                defaultMode: 0400
